<!DOCTYPE html>
<html>
<head>
    <title>Settings</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

<div class="app-shell">

    <aside class="sidebar">
<a href="/dashboard" class="icon-btn">
    <i data-lucide="house"></i>
</a>

<a href="/leaderboard_page" class="icon-btn">
    <i data-lucide="trophy"></i>
</a>

<a href="/profile" class="icon-btn">
    <i data-lucide="user"></i>
</a>

<a href="/settings" class="icon-btn">
    <i data-lucide="settings-2"></i>
</a>
    </aside>

    <main class="main-area">

        <div class="topbar">
            <h2>Settings</h2>
        </div>

        <div class="panel">
            <h3>Choose Accent</h3>

            <div class="theme-row">
                <button class="theme-dot" onclick="setAccent('#38bdf8')" style="background:#38bdf8;"></button>
                <button class="theme-dot" onclick="setAccent('#22c55e')" style="background:#22c55e;"></button>
                <button class="theme-dot" onclick="setAccent('#a855f7')" style="background:#a855f7;"></button>
                <button class="theme-dot" onclick="setAccent('#fb7185')" style="background:#fb7185;"></button>
                <button class="theme-dot" onclick="setAccent('#f59e0b')" style="background:#f59e0b;"></button>
            </div>
        </div>
        <br>
        <div class="panel">
            <div>
                <button class="logout-btn" onclick="logoutUser()">
                    Logout
                </button>
            </div>
        </div>
    </main>

</div>
<script src="https://unpkg.com/lucide@latest"></script>
<script src="/static/js/settings.js"></script>
<script>
    lucide.createIcons();
</script>
</body>
</html>
